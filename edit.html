<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> Edit Student</h2>
    <form method="POST">
    {% csrf_token %}
    <label>Name:</label>
    <input type="text" name="name" value="{{data.name}}" placeholder="Name"><br><br>

    <label>Age:</label>
    <input type="number" name="age" value="{{data.age}}" placeholder="Age"><br><br>

    <label>Email:</label>
    <input type="email" name="email" value="{{data.email}}" placeholder="Email"><br><br>

    <label>Phone:</label>
    <input type="text" name="phone" value="{{data.phone}}" placeholder="Phone"><br><br>

    <button type="submit">Update</button>
</form>
</body>
</html>
