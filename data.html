<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>students data</title>
</head>
<body>
<h1>students data</h1>
<table border="1">
    <tr>
        <th>name</th>
        <th>age</th>
        <th>email</th>
        <th>phone</th>
    </tr>
    {% for i in data %}
    <tr>
        <td>{{i.name}}</td>
        <td>{{i.age}}</td>
        <td>{{i.email}}</td>
        <td>{{i.phone}}</td>
        <td>
        <a href="/edit/{{ i.id }}">Edit</a>
        </td>
        <td>
        <a href="/delete/{{ i.id }}/">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
        

</body>
</html>
